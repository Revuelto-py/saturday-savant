{% extends "base.html" %}

{% block content %}
<div class="page-container">

<h2 style="font-weight:800;font-size: var(--text-xl);margin-bottom: var(--s6)">
    FBS Players
</h2>

<div class="dark-card p-4" style="overflow-x:auto">
    <table id="playersTable" class="table table-striped" style="width:100%">
        <thead>
            <tr>
                <th>#</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Team</th>
                <th>Position</th>
            </tr>
        </thead>
        <tbody>
            {% for player in players %}
            <tr>
                <td>{{ player[4] }}</td>
                <td>{{ player[0] }}</td>
                <td>{{ player[1] }}</td>
                <td>{{ player[2] }}</td>
                <td>{{ player[3] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</div>
{% endblock %}

{% block scripts %}
<script>
$(document).ready(function() {
    $('#playersTable').DataTable();
});
</script>
{% endblock %}
