{% extends "base.html" %}
{% block content %}
<div class="page-wrapper" style="padding-top:80px;text-align:center">
    <img src="/static/logo-128.png" style="height:80px;opacity:0.25;margin-bottom:28px">
    <div style="color:rgba(255,255,255,0.2);font-size:0.65rem;font-weight:800;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:10px">404</div>
    <h1 style="color:white;font-weight:900;font-size:1.6rem;margin-bottom:10px">{{ message or 'Page not found.' }}</h1>
    <p style="color:rgba(255,255,255,0.35);font-size:0.9rem;margin-bottom:28px">The page you're looking for doesn't exist or may have moved.</p>
    <a href="/" style="display:inline-block;background:#3b82f6;color:white;font-weight:700;font-size:0.85rem;padding:10px 24px;border-radius:8px;text-decoration:none;transition:background 0.15s"
       onmouseover="this.style.background='#2563eb'" onmouseout="this.style.background='#3b82f6'">
        Back to Home
    </a>
</div>
{% endblock %}
