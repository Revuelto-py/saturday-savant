{% extends "base.html" %}
{% block title %}Not Found · Saturday Savant{% endblock %}
{% block content %}
<div class="page-wrapper" style="padding-top:80px;text-align:center">
    <img src="/static/logo-128.png" style="height:80px;opacity:0.25;margin-bottom:28px">
    <div style="color: var(--text-dim);font-size: var(--text-xs);font-weight:800;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:10px">404</div>
    <h1 style="font-weight:800;font-size: var(--text-xl);margin-bottom: var(--s3)">{{ message or 'Page not found.' }}</h1>
    <p style="color: var(--text-dim);font-size: var(--text-base);margin-bottom:28px">The page you're looking for doesn't exist or may have moved.</p>
    <a href="/" style="display:inline-block;background:var(--blue);color: var(--text-primary);font-weight:700;font-size: var(--text-base);padding:10px 24px;border-radius: var(--r-md);text-decoration:none;transition:background 0.15s"
       onmouseover="this.style.background='#2563eb'" onmouseout="this.style.background='var(--blue)'">
        Back to Home
    </a>
</div>
{% endblock %}
